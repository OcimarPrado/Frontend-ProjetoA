    <!-- SCHEMA.ORG -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Ocyan Tech",
      "url": "https://ocyan-tech.com.br",
      "logo": "https://ocyan-tech.com.br/favicon.png",

      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Canoas",
        "addressRegion": "RS",
        "addressCountry": "BR"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Brazil"
      },
      "serviceType": [
        "Criação de sites profissionais",
        "Desenvolvimento web",
        "Sites para psicólogos",
        "Sites para estúdios de pilates",
        "Sites para pequenas empresas",
        "Sites para instaladores",
        "Sites para clínicas",
        "Sites para autônomos",
        "Sites para corretores de imóveis",
        "SEO e otimização"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Planos de Sites",
        "itemListElement": [
          {
            "@type": "Offer",
            "name": "Site Institucional",
            "description": "Site profissional com até 5 páginas, SEO incluso e hospedagem"
          },
          {
            "@type": "Offer",
            "name": "Site para Psicólogos",

          },
          {
            "@type": "Offer",
            "name": "Site para Estúdios",
            "description": "Site para estúdios de pilates, yoga e crossfit"
          }
        ]
      }
    }
    </script>
